version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    volumes: ["./:/app"]
    working_dir: /app
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: npm run dev -- --host 0.0.0.0
    ports: ["5173:5173"]
    volumes: ["./frontend:/app"]
    working_dir: /app
    depends_on: [backend]
